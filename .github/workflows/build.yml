name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'
      
      - name: Verify Python
        run: python --version
      
      - name: Install PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
      
      - name: Build EXE
        shell: cmd
        run: |
          pyinstaller --onefile --name "参谋多平台采集台" ^
            --add-data "overseas_extract.py;." ^
            --add-data "overseas_assistant.py;." ^
            --console app_server.py
      
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: 参谋多平台采集台-Windows
          path: dist/参谋多平台采集台.exe
          if-no-files-found: error
